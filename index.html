<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle for You 🧩</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(
    180deg,
    #fce4ec 0%,
    #f48fb1 10%,
    #ce93d8 30%,
    #9c6bce 50%,
    #2e1872 80%,
    #110932 100%
  );
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

/* ✨ Title */
h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.5rem;
  font-weight: 300;
  margin-bottom: 10px;
}

.sub {
  font-size: 0.9rem;
  opacity: 0.7;
  margin-bottom: 20px;
}

/*  Puzzle */
.puzzle {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  width: 90vw;
  max-width: 320px;
  animation: fadeIn 1s ease;
}

.piece {
  aspect-ratio: 1/1;
  background-image: url('images/manyun manyunn.jpeg');
  background-size: 300% 300%;
  border-radius: 10px;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}

.piece:hover {
  transform: scale(1.05);
}

.piece.selected {
  outline: 3px solid pink;
  transform: scale(1.08);
}

/* 🎉 Button */
#complete {
  display: none;
  margin-top: 25px;
  padding: 12px 28px;
  border: 1px solid rgba(255,255,255,.4);
  border-radius: 50px;
  background: transparent;
  color: #fff;
  cursor: pointer;
  letter-spacing: 1.5px;
  transition: all .3s ease;
}

#complete:hover {
  background: rgba(255,255,255,.2);
  transform: scale(1.1);
}

/* ✨ Glow saat menang */
.win {
  animation: glow 1s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px pink; }
  to { box-shadow: 0 0 30px #ff69b4; }
}

/* ✨ Animasi */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

/* 🌌 Bintang */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.5;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(-100vh); }
}
</style>
</head>

<body>

<h2 id="title">Susun Puzzle  🧩</h2>
<p class="sub">Biar makin seru sebelum masuk ke cerita kita</p>

<div class="puzzle" id="puzzle"></div>

<button id="complete" onclick="goNext()">Masuk ke Cerita ❤️</button>

<script>
const puzzle = document.getElementById("puzzle");
let pieces = [];
let selected = null;

let positions = [...Array(9).keys()];
positions.sort(() => Math.random() - 0.5);

positions.forEach(pos => {
  const div = document.createElement("div");
  div.className = "piece";
  
  const x = pos % 3;
  const y = Math.floor(pos / 3);

  div.style.backgroundPosition = `${x * 50}% ${y * 50}%`;

  div.onclick = () => selectPiece(div);

  puzzle.appendChild(div);
  pieces.push(div);
});

function selectPiece(piece) {
  if (!selected) {
    selected = piece;
    piece.classList.add("selected");
  } else {
    swap(selected, piece);
    selected.classList.remove("selected");
    selected = null;
    checkWin();
  }
}

function swap(a, b) {
  let temp = a.style.backgroundPosition;
  a.style.backgroundPosition = b.style.backgroundPosition;
  b.style.backgroundPosition = temp;
}

function checkWin() {
  let win = true;

  pieces.forEach((p, i) => {
    const x = (i % 3) * 50;
    const y = Math.floor(i / 3) * 50;

    if (p.style.backgroundPosition !== `${x}% ${y}%`) {
      win = false;
    }
  });

  if (win) {
    document.getElementById("complete").style.display = "block";
    document.getElementById("title").innerText = "Yee Berhasil! ❤️✨";
    
    pieces.forEach(p => p.classList.add("win"));
  }
}

function goNext() {
  window.location.href = "cintya_update1.html";
}

/* 🌌 efek bintang */
for (let i = 0; i < 40; i++) {
  let star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random() * 100 + "vw";
  star.style.top = Math.random() * 100 + "vh";
  star.style.animationDuration = (Math.random() * 5 + 3) + "s";
  document.body.appendChild(star);
}
</script>

</body>
</html>
